<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta Impacto - Cadastro de Voluntários</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌱 Conecta Impacto</h1>
            <p>Painel de Cadastro e Vinculação de Voluntários</p>
        </header>
        
        <main class="grid">
            <!-- Formulário de Cadastro -->
            <section class="card">
                <h2>Cadastrar Voluntário</h2>
                <form id="cadastro-form">
                    <div class="form-group">
                        <label for="nomeVoluntario">Nome Completo</label>
                        <input type="text" id="nomeVoluntario" required placeholder="Ex: João da Silva">
                    </div>
                    
                    <div class="form-group">
                        <label for="emailVoluntario">E-mail</label>
                        <input type="email" id="emailVoluntario" required placeholder="joao@exemplo.com">
                    </div>

                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: bold; font-size: 12px; color: var(--text-secondary);">ONG VINCULADA</label>
                        <select id="ong-vinculada" style="width: 100%; padding: 10px; border: 1px solid #2a4d4d; border-radius: 4px; background-color: #0f2424; color: var(--text-primary);">
                            <option value="Instituto Conecta RN">Instituto Conecta RN</option>
                            <option value="GACC-RN">GACC-RN</option>
                            <option value="Casa Durval Paiva">Casa de Apoio Durval Paiva</option>
                        </select>
                    </div>

                    <button type="submit">Cadastrar Voluntário</button>
                </form>
            </section>
            
            <!-- Listagem de Voluntários -->
            <section class="card">
                <h2>Voluntários Cadastrados</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>ONG Vinculada</th>
                                <th>Data Cadastro</th>
                            </tr>
                        </thead>
                        <tbody id="lista-voluntarios">
                            <!-- Preenchido dinamicamente -->
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--text-secondary);">Carregando voluntários...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
